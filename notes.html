<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Форма добавления заметки */
        .add-note {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #noteInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #addNoteBtn {
            padding: 12px 25px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        #addNoteBtn:hover {
            background: #45a049;
        }

        /* Список заметок */
        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Карточка заметки */
        .note {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            word-wrap: break-word;
        }

        .note-content {
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .note-date {
            color: #666;
            font-size: 12px;
            text-align: right;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e53935;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мои заметки</h1>

        <!-- Форма добавления новой заметки -->
        <div class="add-note">
            <input type="text" id="noteInput" placeholder="Введите текст заметки...">
            <button id="addNoteBtn">Добавить заметку</button>
        </div>

        <!-- Список заметок -->
        <div class="notes-list" id="notesList">
            <!-- Заметки будут добавляться сюда -->
        </div>
    </div>

    <script>
        // Загружаем заметки из localStorage или создаём пустой массив
        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];

        // Элементы DOM
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const notesList = document.getElementById('notesList');

        // Сохранение заметок в localStorage
        function saveNotes() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
        }

        // Отображение всех заметок
        function renderNotes() {
            notesList.innerHTML = '';

            notes.forEach(note => {
                const noteElement = document.createElement('div');
                noteElement.className = 'note';
                noteElement.innerHTML = `
                    <div class="note-content">${note.text}</div>
            <div class="note-date">${note.createdAt}</div>
            <button class="delete-btn" onclick="deleteNote(${note.id})">×</button>`;

                notesList.appendChild(noteElement);
            });
        }

        // Добавление новой заметки
        function addNote() {
            const noteText = noteInput.value.trim();

            if (!noteText) {
                alert('Введите текст заметки!');
                return;
            }

            const newNote = {
                id: Date.now(),
                text: noteText,
                createdAt: new Date().toLocaleString('ru-RU')
            };

            notes.push(newNote);
            saveNotes();
            renderNotes();

            // Очищаем поле ввода
            noteInput.value = '';
        }

        // Удаление заметки
        function deleteNote(id) {
            notes = notes.filter(note => note.id !== id);
            saveNotes();
            renderNotes();
        }

        // Инициализация приложения
        function init() {
            // Загружаем существующие заметки
            renderNotes();

            // Обработчик кнопки добавления заметки
            addNoteBtn.addEventListener('click', addNote);

            // Обработчик нажатия Enter в поле ввода
            noteInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addNote();
                }
            });
        }

        // Запускаем приложение после загрузки страницы
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
